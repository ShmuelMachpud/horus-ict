services:
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
    env_file:
      - ./auth-service/.env
    volumes:
      - ./auth-service:/app
      - /app/node_modules
  black-list-server:
    build:
      context: ./black-list-server
      dockerfile: Dockerfile.dev
    ports:
      - "11000:11000"
    env_file:
      - ./black-list-server/.env
    volumes:
      - ./black-list-server:/app
      - /app/node_modules
  cac-server:
    build:
      context: ./cac-server
      dockerfile: Dockerfile.dev
    ports:
      - "9000:9000"
    env_file:
      - ./cac-server/.env
    volumes:
      - ./cac-server:/app
      - /app/node_modules
  files-server:
    build:
      context: ./files-server
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    env_file:
      - ./files-server/.env
    volumes:
      - ./files-server:/usr/src/app
      - /usr/src/app/node_modules
  fss-server:
    build:
      context: ./fss-server
      dockerfile: Dockerfile.dev
    ports:
      - "9001:9001"
    env_file:
      - ./fss-server/.env
    volumes:
      - ./fss-server:/app
      - /app/node_modules
  log-server:
    build:
      context: ./log-server
      dockerfile: Dockerfile.dev
    ports:
      - "4321:4321"
    env_file:
      - ./log-server/.env
    volumes:
      - ./log-server:/app
      - /app/node_modules
  mac-server:
    build:
      context: ./mac-server
      dockerfile: Dockerfile.dev
    ports:
      - "9003:9003"
    env_file:
      - ./mac-server/.env
    volumes:
      - ./mac-server:/app
      - /app/node_modules
  socket-server:
    build:
      context: ./socket-server
      dockerfile: Dockerfile.dev
    ports:
      - "9002:9002"
    env_file:
      - ./socket-server/.env
    volumes:
      - ./socket-server:/app
      - /app/node_modules
  unit-symbols:
    build:
      context: ./unit-symbols
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    env_file:
      - ./unit-symbols/.env
    volumes:
      - ./unit-symbols:/app
      - /app/node_modules
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    env_file:
      - ./gateway/.env
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - auth-service
      - black-list-server
      - cac-server
      - files-server
      - fss-server
      - log-server
      - mac-server
      - socket-server
      - unit-symbols
      - frontend
